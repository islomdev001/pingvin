<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pingvin Fast-food — Jarqo'rg'on. Tez kunda.">
    <meta property="og:title" content="Pingvin Fast-food — Tez Kunda">
    <meta property="og:description" content="Yangi fast-food kafemiz tez orada siz bilan birga bo'ladi!">
    <link class="icon-tag" rel="icon" href="/icon.svg" type="image/x-icon">
    <title>Pingvin Fast-food — Tez Kunda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:   #E63030;
            --black: #0A0A0A;
            --dark:  #141414;
            --white: #F2F2F0;
            --gray:  #666;
        }

        html, body { height: 100%; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem 5rem;
            overflow-x: hidden;
        }

        /* --- Noise texture overlay --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: #000;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 12vw, 108px);
            letter-spacing: 0.18em;
            line-height: 1;
            color: var(--white);
            animation: fadeDown 0.8s ease both;
        }

        .sub {
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gray);
            margin-top: 8px;
            animation: fadeDown 0.8s 0.1s ease both;
        }

        .line {
            width: 48px;
            height: 3px;
            background: var(--red);
            margin: 36px auto;
            animation: grow 0.6s 0.3s ease both;
            transform-origin: center;
        }

        .penguin-wrap {
            margin: 0 auto 36px;
            width: 100%;
            animation: float 5s ease-in-out infinite, fadeUp 0.8s 0.4s ease both;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50%       { transform: translateY(-14px) rotate(1deg); }
        }

        .coming {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(64px, 18vw, 148px);
            letter-spacing: 0.04em;
            line-height: 0.88;
            animation: fadeUp 0.8s 0.5s ease both;
        }

        .coming .accent { color: var(--red); }

        .desc {
            font-size: 15px;
            line-height: 1.8;
            color: var(--gray);
            margin-top: 28px;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeUp 0.8s 0.6s ease both;
        }

        .contacts {
            margin-top: 44px;
            display: flex;
            gap: 8px 28px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.8s 0.7s ease both;
        }

        .contacts a {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1.5px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .contacts a:hover {
            color: var(--red);
            border-bottom-color: var(--red);
        }

        .contacts a svg {
            flex-shrink: 0;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .contacts a:hover svg { opacity: 1; }

        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 18px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: #aaa;
            border-top: 0.5px solid #1a1a1a;
            background: var(--black);
            z-index: 2;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes grow {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .contacts { gap: 6px 20px; }
            .contacts a { font-size: 13px; }
        }
    </style>
</head>
